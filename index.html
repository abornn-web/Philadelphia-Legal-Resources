<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philadelphia Legal Resources Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous"/>
    
    <style>
        /* Modern & Serious Color Palette & Layout */
        :root {
            --bg-primary: #ffffff;
            --bg-sidebar: #f8fafc;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-color: #1e3a8a; /* Slate / Deep Blue */
            --accent-light: #eff6ff;
            --search-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            background-color: var(--bg-primary);
            height: 100vh;
            overflow: hidden;
        }

        #dashboard {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        #sidebar {
            width: 400px;
            height: 100%;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 2px 0 12px rgba(15, 23, 42, 0.05);
        }

        .sidebar-header {
            padding: 24px;
            background-color: var(--accent-color);
            color: white;
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 0.85rem;
            color: #93c5fd;
            opacity: 0.9;
        }

        .search-container {
            padding: 16px 24px;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
            background-color: var(--search-bg);
            color: var(--text-main);
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.15);
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
        }

        .provider-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .provider-card:hover {
            border-color: var(--text-muted);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
        }

        .provider-card.active {
            border-left: 4px solid var(--accent-color);
            background-color: var(--accent-light);
            border-color: var(--border-color);
        }

        .provider-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .provider-phone {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .provider-phone a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        .provider-phone a:hover {
            text-decoration: underline;
        }

        #map {
            flex: 1;
            height: 100%;
        }

        /* Clean Popups styling */
        .leaflet-popup-content-wrapper {
            border-radius: 6px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            font-family: inherit;
        }
        .popup-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
            color: var(--text-main);
        }
        .popup-detail {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Responsive Breakpoint for Mobile Layouts */
        @media (max-width: 768px) {
            #dashboard {
                flex-direction: column-reverse;
            }
            #sidebar {
                width: 100%;
                height: 45%;
            }
            #map {
                height: 55%;
            }
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <div id="sidebar">
            <div class="sidebar-header">
                <h1>Legal Services Directory</h1>
                <p>Philadelphia Regional Resources Map</p>
            </div>
            <div class="search-container">
                <input type="text" id="search" class="search-input" placeholder="Search resources by name or phone...">
            </div>
            <div id="list" class="list-container">
                </div>
        </div>
        
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
    
    <script>
        // Initialize Map centered dynamically over Greater Philadelphia region
        const map = L.map('map').setView([39.9526, -75.1652], 12);

        // Add Base OpenStreetMap Layer over Fully Secure HTTPS Protocol
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            crossOrigin: true,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors'
        }).addTo(map);

        const csvUrl = 'https://raw.githubusercontent.com/abornn-web/Philadelphia-Legal-Resources/refs/heads/main/Git%20Legal%20Resource%20Data_Base%20-%20Legal%20Resource%20(1).csv';
        
        let providersData = [];
        let markersGroup = L.layerGroup().addTo(map);
        const markerMap = new Map();

        // Standardized, State-Machine CSV Parser targeting row offsets, embedded breaks, and complex structural nesting
        function parseCSV(text) {
            const lines = [];
            let row = [""];
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                const next = text[i+1];

                if (c === '"' || c === "'") {
                    if (inQuotes && next === c) {
                        // Handle escaped double-quotes safely ("")
                        row[row.length - 1] += c;
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (c === ',' && !inQuotes) {
                    row.push('');
                } else if ((c === '\r' || c === '\n') && !inQuotes) {
                    if (c === '\r' && next === '\n') {
                        i++;
                    }
                    lines.push(row);
                    row = [''];
                } else {
                    row[row.length - 1] += c;
                }
            }
            if (row.length > 1 || row[0] !== '') {
                lines.push(row);
            }

            if (lines.length === 0) return [];

            // Strip out hidden Byte Order Marks (\ufeff) or casing variances from headers
            const headers = lines[0].map(h => h.toLowerCase().trim().replace(/^\ufeff/, ''));
            
            return lines.slice(1).map((values, idx) => {
                const obj = { id: idx }; 
                headers.forEach((header, index) => {
                    if (header) {
                        obj[header] = values[index] !== undefined ? values[index].trim() : '';
                    }
                });
                return obj;
            });
        }

        // Standardized sanitizer to neutralize leading-zero padding anomalies and quotes on numeric parsing
        function sanitizeCoordinate(val) {
            if (val === undefined || val === null) return NaN;
            // Clean out remaining quotes or structural wrapping
            let cleaned = String(val).replace(/^["']|["']$/g, '').trim();
            if (!cleaned) return NaN;
            
            // Regex handles leading zero trims cleanly without mutating decimal values (e.g. "039.95" -> "39.95", "-075.16" -> "-75.16")
            cleaned = cleaned.replace(/^(-?)0+(?=\d)/, '$1');
            
            const parsed = parseFloat(cleaned);
            return isNaN(parsed) ? NaN : parsed;
        }

        // Fetch source CSV resource securely
        fetch(csvUrl)
            .then(response => {
                if (!response.ok) throw new Error(`Network tracking rejected request: ${response.status}`);
                return response.text();
            })
            .then(csvText => {
                const rawData = parseCSV(csvText);
                if (rawData.length === 0) return;

                // Identify column keys intelligently by evaluating schema variations
                const keys = Object.keys(rawData[0]);
                const nameKey = keys.find(k => k.includes('name') || k.includes('org') || k.includes('resource') || k.includes('title') || k.includes('provider')) || keys[1];
                const phoneKey = keys.find(k => k.includes('phone') || k.includes('tel') || k.includes('contact')) || keys[2];
                const latKey = keys.find(k => k === 'lat' || k.includes('latitude') || k === 'y');
                const lngKey = keys.find(k => k === 'lng' || k.includes('long') || k.includes('longitude') || k === 'x');

                // Normalize data collection structure safely
                providersData = rawData.map(item => ({
                    id: item.id,
                    name: item[nameKey] || 'Unnamed Provider',
                    phone: item[phoneKey] || 'No phone provided',
                    lat: sanitizeCoordinate(item[latKey]),
                    lng: sanitizeCoordinate(item[lngKey])
                }));

                renderDashboard(providersData);
            })
            .catch(err => console.error('Error fetching or processing legal resource database:', err));

        // Global Render/Update Loop
        function renderDashboard(data) {
            markersGroup.clearLayers();
            markerMap.clear();
            const listContainer = document.getElementById('list');
            listContainer.innerHTML = '';

            const bounds = [];

            data.forEach(item => {
                // Generate Left Sidebar Elements
                const card = document.createElement('div');
                card.className = 'provider-card';
                card.setAttribute('data-id', item.id);
                card.innerHTML = `
                    <div class="provider-name">${item.name}</div>
                    <div class="provider-phone">
                        <span>📞</span> ${item.phone !== 'No phone provided' ? `<a href="tel:${item.phone.replace(/\D/g,'')}">${item.phone}</a>` : item.phone}
                    </div>
                `;

                // Handle Sidebar Node Interactions -> Map Response
                card.addEventListener('click', () => {
                    document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    
                    if (!isNaN(item.lat) && !isNaN(item.lng)) {
                        const marker = markerMap.get(item.id);
                        if (marker) {
                            map.flyTo([item.lat, item.lng], 15, { animate: true, duration: 1 });
                            marker.openPopup();
                        }
                    }
                });

                listContainer.appendChild(card);

                // Add Point Geometries to Map Canvas
                if (!isNaN(item.lat) && !isNaN(item.lng)) {
                    // Using modern solid circle markers for clean dashboard aesthetics instead of raw pins
                    const marker = L.circleMarker([item.lat, item.lng], {
                        radius: 8,
                        fillColor: '#1e3a8a',
                        color: '#ffffff',
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.9
                    });

                    const popupContent = `
                        <div class="popup-title">${item.name}</div>
                        <div class="popup-detail">📞 ${item.phone}</div>
                    `;
                    marker.bindPopup(popupContent);

                    // Handle Marker Clicks -> Sidebar List Response
                    marker.on('click', () => {
                        document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('active'));
                        const targetCard = document.querySelector(`.provider-card[data-id="${item.id}"]`);
                        if (targetCard) {
                            targetCard.classList.add('active');
                            targetCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                    });

                    marker.addTo(markersGroup);
                    markerMap.set(item.id, marker);
                    bounds.push([item.lat, item.lng]);
                }
            });

            // Adjust viewport boundaries automatically to encompass valid plotted vectors
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [40, 40] });
            }
        }

        // Search Input Filter Event Pipeline
        document.getElementById('search').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredData = providersData.filter(item => 
                item.name.toLowerCase().includes(searchTerm) || 
                item.phone.toLowerCase().includes(searchTerm)
            );
            renderDashboard(filteredData);
        });
    </script>
</body>
</html>
