<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philadelphia Legal Resources Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous"/>
    
    <style>
        /* Modern, Serious Institutional Palette */
        :root {
            --bg-primary: #ffffff;
            --bg-sidebar: #f8fafc;
            --border-color: #cbd5e1;
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-color: #1e3a8a; /* Slate / Deep Blue */
            --accent-light: #f0fdf4; /* Light green highlight tint for matches */
            --card-active-bg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            background-color: var(--bg-primary);
            height: 100vh;
            overflow: hidden;
        }

        #dashboard {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        #sidebar {
            width: 420px;
            height: 100%;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 2px 0 12px rgba(15, 23, 42, 0.05);
        }

        .sidebar-header {
            padding: 24px;
            background-color: var(--accent-color);
            color: white;
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 0.85rem;
            color: #93c5fd;
            opacity: 0.9;
        }

        .search-container {
            padding: 16px 24px;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.15);
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
        }

        /* Interactive Dynamic Information Cards */
        .provider-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .provider-card:hover {
            border-color: var(--text-muted);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .provider-card.active {
            border-left: 4px solid var(--accent-color);
            background-color: var(--card-active-bg);
        }

        .provider-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .provider-meta-primary {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }

        .provider-meta-primary a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        .provider-meta-primary a:hover {
            text-decoration: underline;
        }

        /* Collapsible Metadata Panel containing all compiled information fields */
        .provider-details-panel {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--border-color);
            font-size: 0.8rem;
            display: none; /* Shown dynamically when active */
        }

        .provider-card.active .provider-details-panel {
            display: block;
        }

        .info-row {
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .info-label {
            font-weight: 600;
            color: var(--text-main);
            text-transform: capitalize;
        }

        .info-value {
            color: var(--text-muted);
        }

        #map {
            flex: 1;
            height: 100%;
        }

        /* Stylized Interactive Map Popups */
        .leaflet-popup-content-wrapper {
            border-radius: 6px;
            padding: 6px;
            max-width: 320px;
        }
        
        .popup-scroll-container {
            max-height: 200px;
            overflow-y: auto;
            padding-right: 4px;
            font-size: 0.8rem;
        }

        .popup-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 6px;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
        }

        @media (max-width: 768px) {
            #dashboard { flex-direction: column-reverse; }
            #sidebar { width: 100%; height: 45%; }
            #map { height: 55%; }
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <div id="sidebar">
            <div class="sidebar-header">
                <h1>Legal Services Directory</h1>
                <p>Philadelphia Regional Resources Map</p>
            </div>
            <div class="search-container">
                <input type="text" id="search" class="search-input" placeholder="Search by name, phone, address, services...">
            </div>
            <div id="list" class="list-container">
                </div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
    
    <script>
        // Initialize Map layout centered on Greater Philadelphia
        const map = L.map('map').setView([39.9526, -75.1652], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            crossOrigin: true,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a>'
        }).addTo(map);

        const csvUrl = 'https://raw.githubusercontent.com/abornn-web/Philadelphia-Legal-Resources/refs/heads/main/Git%20Legal%20Resource%20Data_Base%20-%20Legal%20Resource%20(1).csv';
        
        let providersData = [];
        let markersGroup = L.layerGroup().addTo(map);
        const markerMap = new Map();

        // High-Fidelity Character State-Machine CSV Parser (Supports long rows, breaks, and embedded quotes)
        function parseCSV(text) {
            const lines = [];
            let row = [""];
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                const next = text[i+1];

                if (c === '"' || c === "'") {
                    if (inQuotes && next === c) {
                        row[row.length - 1] += c;
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (c === ',' && !inQuotes) {
                    row.push('');
                } else if ((c === '\r' || c === '\n') && !inQuotes) {
                    if (c === '\r' && next === '\n') i++;
                    lines.push(row);
                    row = [''];
                } else {
                    row[row.length - 1] += c;
                }
            }
            if (row.length > 1 || row[0] !== '') lines.push(row);
            if (lines.length === 0) return [];

            const headers = lines[0].map(h => h.toLowerCase().trim().replace(/^\ufeff/, ''));
            
            return lines.slice(1).map((values, idx) => {
                const obj = { _rawRow: {} }; 
                headers.forEach((header, index) => {
                    if (header) {
                        const val = values[index] !== undefined ? values[index].trim() : '';
                        obj[header] = val;
                        obj._rawRow[header] = val; // Hold onto exact key matching for data extraction panels
                    }
                });
                return obj;
            });
        }

        // Standardized numeric cleanser handling leading zero paddings (e.g., "039.95" -> 39.95)
        function sanitizeCoordinate(val) {
            if (!val) return NaN;
            let cleaned = String(val).replace(/^["']|["']$/g, '').trim();
            cleaned = cleaned.replace(/^(-?)0+(?=\d)/, '$1');
            const parsed = parseFloat(cleaned);
            return isNaN(parsed) ? NaN : parsed;
        }

        fetch(csvUrl)
            .then(response => {
                if (!response.ok) throw new Error("Database file response error.");
                return response.text();
            })
            .then(csvText => {
                const rawData = parseCSV(csvText);
                if (rawData.length === 0) return;

                const keys = Object.keys(rawData[0]).filter(k => k !== '_rawRow');
                
                // Flexible text property target mappings
                const nameKey = keys.find(k => k.includes('name') || k.includes('org') || k.includes('resource') || k.includes('title')) || keys[0];
                const phoneKey = keys.find(k => k.includes('phone') || k.includes('tel') || k.includes('contact')) || '';
                const addressKey = keys.find(k => k.includes('address') || k.includes('location') || k.includes('street')) || '';
                const webKey = keys.find(k => k.includes('web') || k.includes('url') || k.includes('link') || k.includes('site')) || '';

                // Explicit coordinate targets
                let latKey = keys.find(k => k === 'lat' || k === 'latitude' || k.endsWith('_lat') || k.includes('latitude'));
                let lngKey = keys.find(k => k === 'lng' || k === 'long' || k === 'longitude' || k.endsWith('_lng') || k.includes('longitude'));

                providersData = rawData.map((item, idx) => {
                    let finalLat = sanitizeCoordinate(item[latKey]);
                    let finalLng = sanitizeCoordinate(item[lngKey]);

                    /* CRITICAL FIX: AGGRESIVE BOUNDING-BOX HARVESTER
                       If standard explicit coordinate headers missed matching, or evaluations are empty,
                       dynamically scrape every cell in the row array for values matching the 
                       Geographic footprint coordinates of the Greater Philadelphia Area.
                    */
                    if (isNaN(finalLat) || !finalLng) {
                        for (const currentKey of keys) {
                            const val = sanitizeCoordinate(item[currentKey]);
                            if (!isNaN(val)) {
                                // Check if value is within Philly regional Latitude brackets
                                if (val >= 39.0 && val <= 40.5 && isNaN(finalLat)) {
                                    finalLat = val;
                                }
                                // Check if value is within Philly regional Longitude brackets
                                if (val >= -76.0 && val <= -74.0 && isNaN(finalLng)) {
                                    finalLng = val;
                                }
                            }
                        }
                    }

                    return {
                        id: idx,
                        name: item[nameKey] || 'Unnamed Organization',
                        phone: phoneKey ? item[phoneKey] : '',
                        address: addressKey ? item[addressKey] : '',
                        website: webKey ? item[webKey] : '',
                        lat: finalLat,
                        lng: finalLng,
                        fullDataMap: item._rawRow // Retains all columns for dynamic rendering
                    };
                });

                renderDashboard(providersData);
            })
            .catch(err => console.error('Database configuration error:', err));

        // Global Loop Rendering Dynamic Context
        function renderDashboard(data) {
            markersGroup.clearLayers();
            markerMap.clear();
            const listContainer = document.getElementById('list');
            listContainer.innerHTML = '';

            const bounds = [];

            data.forEach(item => {
                // Compile additional informational attributes dynamically (filtering out empty cells)
                let detailRowsHtml = '';
                let popupRowsHtml = '';
                
                Object.entries(item.fullDataMap).forEach(([key, value]) => {
                    // Filter out coordinate keys, empty metrics, and basic indices to keep info readable
                    if (value && value !== '0' && key !== 'id' && !key.startsWith('_') && !key.includes('lat') && !key.includes('long')) {
                        const rowMarkup = `
                            <div class="info-row">
                                <span class="info-label">${key.replace(/_/g, ' ')}:</span>
                                <span class="info-value">${value}</span>
                            </div>`;
                        detailRowsHtml += rowMarkup;
                        popupRowsHtml += rowMarkup;
                    }
                });

                // Generate Left Sidebar Elements
                const card = document.createElement('div');
                card.className = 'provider-card';
                card.setAttribute('data-id', item.id);
                
                card.innerHTML = `
                    <div class="provider-name">${item.name}</div>
                    ${item.phone ? `<div class="provider-meta-primary"><span>📞</span> <a href="tel:${item.phone.replace(/\D/g,'')}">${item.phone}</a></div>` : ''}
                    ${item.address ? `<div class="provider-meta-primary"><span>📍</span> <span>${item.address}</span></div>` : ''}
                    ${item.website ? `<div class="provider-meta-primary"><span>🌐</span> <a href="${item.website.startsWith('http') ? item.website : 'https://' + item.website}" target="_blank">Visit Website</a></div>` : ''}
                    
                    <div class="provider-details-panel">
                        ${detailRowsHtml ? detailRowsHtml : '<p style="color:var(--text-muted)">No supplementary details recorded.</p>'}
                    </div>
                `;

                // Handle Card Click Interactions -> View Alignment
                card.addEventListener('click', () => {
                    document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    
                    if (!isNaN(item.lat) && !isNaN(item.lng)) {
                        const marker = markerMap.get(item.id);
                        if (marker) {
                            map.flyTo([item.lat, item.lng], 15, { animate: true, duration: 1 });
                            marker.openPopup();
                        }
                    }
                });

                listContainer.appendChild(card);

                // Add Point Geometries onto Leaflet Viewport
                if (!isNaN(item.lat) && !isNaN(item.lng)) {
                    const marker = L.circleMarker([item.lat, item.lng], {
                        radius: 8,
                        fillColor: '#1e3a8a',
                        color: '#ffffff',
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.9
                    });

                    // Interactive Popup Window with Scrollable Content View
                    const popupContent = `
                        <div class="popup-title">${item.name}</div>
                        <div class="popup-scroll-container">
                            ${item.phone ? `<div><b>Phone:</b> ${item.phone}</div>` : ''}
                            ${item.address ? `<div><b>Address:</b> ${item.address}</div>` : ''}
                            <hr style="margin:6px 0; border:0; border-top:1px solid var(--border-color);">
                            ${popupRowsHtml}
                        </div>
                    `;
                    marker.bindPopup(popupContent);

                    // Map Point Interaction -> Sidebar Sync
                    marker.on('click', () => {
                        document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('active'));
                        const targetCard = document.querySelector(`.provider-card[data-id="${item.id}"]`);
                        if (targetCard) {
                            targetCard.classList.add('active');
                            targetCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                    });

                    marker.addTo(markersGroup);
                    markerMap.set(item.id, marker);
                    bounds.push([item.lat, item.lng]);
                }
            });

            // Auto-adjust layout limits to embrace data structures
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [40, 40] });
            }
        }

        /* UNIVERSAL SEARCH MATRIX:
           Scans every cell value of the record row across all columns, allowing users
           to search for resources by zip code, eligibility, type, or service names.
        */
        document.getElementById('search').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();
            if (!searchTerm) {
                renderDashboard(providersData);
                return;
            }

            const filteredData = providersData.filter(item => {
                // Check if search text matches any value inside the compiled data map
                return Object.values(item.fullDataMap).some(val => 
                    String(val).toLowerCase().includes(searchTerm)
                );
            });
            
            renderDashboard(filteredData);
        });
    </script>
</body>
</html>
